  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body {
      background: #050505;
      color: #ffffff;
      font-family: 'Space Grotesk', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Custom cursor (hide default everywhere) ── */
    * { cursor: none !important; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar        { width: 2px; }
    ::-webkit-scrollbar-track  { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb  { background: var(--orange); }

    /* ── Selection ── */
    ::selection { background: var(--orange); color: #050505; }

    /* ── Custom cursor elements ── */
    #rb-cursor {
      position: fixed;
      width: 7px; height: 7px;
      background: var(--orange);
      border-radius: 50%;
      pointer-events: none;
      z-index: 99999;
      transform: translate(-50%, -50%);
      transition: transform 0.08s ease, opacity 0.2s;
      mix-blend-mode: normal;
    }
    #rb-cursor-ring {
      position: fixed;
      width: 30px; height: 30px;
      border: 1px solid rgba(var(--orange-rgb), 0.45);
      border-radius: 50%;
      pointer-events: none;
      z-index: 99998;
      transform: translate(-50%, -50%);
      display: flex; align-items: center; justify-content: center;
      transition: width 0.3s ease, height 0.3s ease, opacity 0.3s, background 0.3s ease, border-color 0.3s ease;
    }
    #rb-cursor-ring::after {
      content: 'PLAY';
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.22em;
      color: #050505;
      opacity: 0;
      transform: scale(0.6);
      transition: opacity 0.25s ease, transform 0.35s cubic-bezier(0.16,1,0.3,1);
    }
    /* Cursor over a work card → orange PLAY badge */
    body.cursor-work #rb-cursor { opacity: 0; }
    body.cursor-work #rb-cursor-ring {
      width: 74px; height: 74px;
      background: rgba(var(--orange-rgb), 0.95);
      border-color: transparent;
      box-shadow: 0 0 36px rgba(var(--orange-rgb), 0.35);
    }
    body.cursor-work #rb-cursor-ring::after {
      opacity: 1;
      transform: scale(1);
    }
    body.cursor-active #rb-cursor       { transform: translate(-50%, -50%) scale(2.5); opacity: 0.5; }
    body.cursor-active #rb-cursor-ring  { opacity: 0; transition: none; }

    /* ── Section wire divider (orange lit line) ── */
    .rb-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(var(--orange-rgb), 0.5) 40%, rgba(var(--orange-rgb), 0.5) 60%, transparent);
      box-shadow: 0 0 12px rgba(var(--orange-rgb), 0.18);
    }

    /* ── Utility ── */
    #root { min-height: 100vh; }

    /* Page padding-bottom safety */
    body::after {
      content: '';
      display: block;
      height: 1px;
      background: transparent;
    }
  </style>

  <!-- Cursor animation script -->
  <script>
    (function () {
      var dot  = document.getElementById('rb-cursor');
      var ring = document.getElementById('rb-cursor-ring');
      var mx = window.innerWidth / 2, my = window.innerHeight / 2;
      var rx = mx, ry = my;

      var CLICKABLE = 'a, button, input, textarea, label, select, summary, [role="button"], [role="link"], [onclick], [tabindex]';
      function isClickable(el) {
        return el && el.closest && el.closest(CLICKABLE);
      }

      // Position the dot AND re-evaluate the interactive state on every move.
      // Driving "cursor-active" from mousemove (instead of mouseover/mouseout)
      // makes it self-healing: if the element under the cursor changes — e.g.
      // a clicked link unmounts during a view change — the very next movement
      // re-checks what's actually beneath the cursor and restores the ring.
      // (mouseout never fires for an element that was removed, which used to
      // leave the ring permanently hidden over the sphere.)
      document.addEventListener('mousemove', function (e) {
        mx = e.clientX; my = e.clientY;
        dot.style.left = mx + 'px';
        dot.style.top  = my + 'px';

        // The ring only collapses when actually interacting with something.
        if (!document.body.classList.contains('cursor-work')) {
          if (isClickable(e.target)) document.body.classList.add('cursor-active');
          else document.body.classList.remove('cursor-active');
        }
      });

      // Smooth ring follow
      (function loop() {
        rx += (mx - rx) * 0.14;
        ry += (my - ry) * 0.14;
        ring.style.left = Math.round(rx) + 'px';
        ring.style.top  = Math.round(ry) + 'px';
        requestAnimationFrame(loop);
      })();

    })();
  </script>
