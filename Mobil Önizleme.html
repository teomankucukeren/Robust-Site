<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robust — Mobil Önizleme</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #0a0a0b;
      background-image:
        radial-gradient(1200px 800px at 50% -10%, rgba(255,69,0,0.10), transparent 60%),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0 1px, transparent 1px 40px);
      color: #fff;
      font-family: 'Space Mono', monospace;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      padding: 40px 20px;
      overflow-x: hidden;
    }
    .cap {
      text-align: center;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }
    .cap b { color: #ff4500; font-weight: 700; }
    #stage {
      /* scale-to-fit wrapper keeps the whole phone visible in any viewport */
      transform-origin: center center;
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
          integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
          integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
          integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
          crossorigin="anonymous"></script>
</head>
<body>
  <div class="cap">Robust — Mobil Önizleme · <b>iPhone · 390&nbsp;px</b></div>
  <div id="stage"></div>
  <div class="cap">Site telefon genişliğinde gerçek haliyle çalışıyor — kaydır, tıkla, menüyü aç</div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel">
    function Preview() {
      return (
        <IOSDevice width={390} height={844} dark>
          <div style={{ height: '100%', background: '#050505', paddingTop: 50 }}>
            <iframe
              title="Robust mobil"
              src="index.html"
              style={{ width: '100%', height: '100%', border: 0, display: 'block', background: '#050505' }}
              allow="autoplay; fullscreen">
            </iframe>
          </div>
        </IOSDevice>
      );
    }
    ReactDOM.createRoot(document.getElementById('stage')).render(<Preview />);

    // Scale the phone down to fit short viewports so it's never clipped.
    function fit() {
      const stage = document.getElementById('stage');
      if (!stage) return;
      const margin = 150; // room for captions + padding
      const avail = window.innerHeight - margin;
      const s = Math.min(1, avail / 844);
      stage.style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', fit);
    setTimeout(fit, 60);
  </script>
</body>
</html>
